<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Website Content Generator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
      </div>
      AI Content Generator
    </div>
    <div class="header-right">
      <span class="theme-label" id="themeLabel">Light</span>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- Hero Text -->
    <div class="hero-text">
      <h1>AI Website Content Generator</h1>
      <p>Generate complete, professional website copy for any business — instantly.</p>
    </div>

    <!-- ===== INPUT CARD ===== -->
    <div class="card">
      <div class="card-title">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        Business Details
      </div>

      <div class="form-grid">
        <!-- Website Type -->
        <div class="field">
          <label>Website Type *</label>
          <input id="websiteType" type="text" placeholder="e.g. Bakery, Law Firm, Gym" maxlength="80" />
          <span class="char-counter"><span id="typeCount">0</span>/80</span>
        </div>

        <!-- Business Name -->
        <div class="field">
          <label>Business Name</label>
          <input id="businessName" type="text" placeholder="e.g. Horizon Legal Group" maxlength="80" />
        </div>

        <!-- Target Audience -->
        <div class="field">
          <label>Target Audience</label>
          <input id="targetAudience" type="text" placeholder="e.g. Small business owners" maxlength="120" />
        </div>

        <!-- Location -->
        <div class="field">
          <label>Location (optional)</label>
          <input id="location" type="text" placeholder="e.g. New York, NY" maxlength="80" />
        </div>

        <!-- Tone -->
        <div class="field form-full">
          <label>Tone of Voice</label>
          <div class="tone-group" id="toneGroup">
            <button class="tone-btn active" data-tone="Professional">Professional</button>
            <button class="tone-btn" data-tone="Friendly">Friendly</button>
            <button class="tone-btn" data-tone="Luxury">Luxury</button>
            <button class="tone-btn" data-tone="Casual">Casual</button>
          </div>
        </div>
      </div>

      <!-- Error Message -->
      <div class="error-msg" id="errorMsg"></div>

      <!-- Action Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="generateBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          Generate Content
        </button>
        <button class="btn btn-ghost" id="resetBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
          </svg>
          Reset
        </button>
      </div>
    </div>

    <!-- ===== LOADING CARD ===== -->
    <div class="card loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">Building your website content...</div>
      <div class="loading-sub">Generating 3 full variations with all sections</div>
    </div>

    <!-- ===== OUTPUT CARD ===== -->
    <div class="card output-hidden" id="outputCard">
      <div class="card-title">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        Generated Content
        <span class="char-info" id="charInfo"></span>
      </div>

      <!-- Variation Tabs -->
      <div class="tabs" id="variationTabs">
        <button class="tab-btn active" data-var="0">Variation 1</button>
        <button class="tab-btn" data-var="1">Variation 2</button>
        <button class="tab-btn" data-var="2">Variation 3</button>
      </div>

      <!-- Variations will be injected here by JS -->
      <div id="variationsContainer"></div>

      <!-- Download / Copy Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="copyAllBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          Copy All
        </button>
        <button class="btn btn-ghost" id="downloadTxtBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Download TXT
        </button>
        <button class="btn btn-ghost" id="downloadPdfBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          Download PDF
        </button>
      </div>
    </div>

    <!-- ===== HISTORY CARD ===== -->
    <div class="card">
      <div class="card-title">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
        </svg>
        Recent Generations
        <button class="btn btn-danger" id="clearHistoryBtn"
          style="margin-left:auto;padding:5px 12px;font-size:.78rem">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14H6L5 6" /><path d="M10 11v6" /><path d="M14 11v6" />
            <path d="M9 6V4h6v2" />
          </svg>
          Clear
        </button>
      </div>
      <div id="historyList"></div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
